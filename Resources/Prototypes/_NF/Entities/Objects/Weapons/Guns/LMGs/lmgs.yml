
#region WizDen
- type: entity
  id: NFWeaponLightMachineGunL6
  parent: [ NFBaseWeaponLightMachineGunChamber20, NFBaseWeaponFrameLightMachineGunGorlex ]
  name: GSW LMG-6
  description: |-
    A rather traditionally made LMG with a pleasantly lacquered wooden pistol grip. An illegal firearm often used by Syndicate agents.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true

- type: entity
  id: NFWeaponLightMachineGunL6C
  parent: [ NFBaseWeaponEncumbranceSniper, NFBaseGunMeleeAttackHigh, NFBaseItemWeaponGunMagazineFed, BaseC3SyndicateContraband ]
  name: cyborg GSW LMG-6
  description: |-
    A GSW LMG-6 for use by cyborgs. Creates rifle ammo on the fly from an internal ammo fabricator, which slowly self-charges. An illegal firearm often used by Syndicate agents.
  components:
  - type: Gun
    minAngle: 3
    maxAngle: 15
    angleIncrease: 1.3
    angleDecay: 4.7
    examineCaliber: gun-examine-caliber-20
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: ProjectileBatteryAmmoProvider
    proto: NFCartridgeRifle20
    fireCost: 100
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 25
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-gorlex-steel-works